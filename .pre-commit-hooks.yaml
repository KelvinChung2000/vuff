- id: vuff-format
  name: vuff format
  description: Format SystemVerilog source with vuff (writes changes in place).
  entry: scripts/vuff-pre-commit format
  language: script
  types_or: [systemverilog, verilog]
  files: '\.(sv|svh|v|vh)$'
  require_serial: false
  pass_filenames: true

- id: vuff-format-check
  name: vuff format --check
  description: Fail if any SystemVerilog source would be reformatted by vuff. Does not write changes.
  entry: scripts/vuff-pre-commit format --check
  language: script
  types_or: [systemverilog, verilog]
  files: '\.(sv|svh|v|vh)$'
  require_serial: false
  pass_filenames: true

- id: vuff-lint
  name: vuff lint
  description: Run the vuff linter (svlint-backed) over SystemVerilog sources.
  entry: scripts/vuff-pre-commit lint
  language: script
  types_or: [systemverilog, verilog]
  files: '\.(sv|svh|v|vh)$'
  require_serial: false
  pass_filenames: true
